<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subscribed! — Contract Summarizer</title>
<style>
  body { font-family: sans-serif; background: #F7F5F0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 12px; padding: 48px 40px; text-align: center; max-width: 400px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  .icon { font-size: 56px; margin-bottom: 16px; }
  h1 { font-size: 24px; margin-bottom: 8px; color: #1A1714; }
  p { font-size: 14px; color: #6B6560; margin-bottom: 24px; }
  a { display: inline-block; background: #2B4A3F; color: #fff; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; }
  a:hover { background: #1e3a30; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>You're subscribed!</h1>
  <p>Your subscription is active. You now have unlimited contract analyses. Thank you for subscribing!</p>
  <a href="/">Start Analyzing →</a>
</div>
<script>
  // Pass session_id and email back to index.html via URL params
  const params = new URLSearchParams(window.location.search);
  if (params.get('session_id') && params.get('email')) {
    const link = document.querySelector('a');
    link.href = `/?session_id=${params.get('session_id')}&email=${params.get('email')}`;
  }
</script>
</body>
</html>
